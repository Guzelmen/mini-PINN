###############
# Config for Phase 4: Temperature-dependent Thomas-Fermi
# Inputs: [x, alpha, T_kV]
# SMALL RANGE: alpha ~1-5, T 1-10 keV
###############

base_config: &BASE_CONFIG
    ## parameters
  random_seed: 42

  run_name: "curric_stage1_a0p5-5_T1-10_LAMX_CONTINUOUS_LOSSES_BOUND_ADDED_clip1_LINEAR_DECAY"
  wandb_notes: "mega data change, even more mega data range. \
    Using best model from 1e-6 clamp, with log x as detached 4th input"
## wandb parameters
  use_wandb: True  # Set False to disable all wandb logging
  wandb_group: "week16mar"
  wandb_project: "mini_pinn"
  wandb_entity: "guzelmen_msci_project"
  wandb_tags: ["norm_loss_weights_to_1", "512pts_perbatch", "curriculum_stage1"]

  phase: 4 # temperature-dependent TF
  n_vars: 3  # network inputs
  debug_mode: False

  ## model parameters
  mode: "hard" # "soft" or "hard"
  inp_dim: 3  
  nlayers: 8
  hidden: 128
  activation: "SiLU" # SiLU, Tanh, ReLU, Identity, SIREN, GELU, Mish
  w0: 30
  add_phi0: False
  k_val: 10
  
  # phase 4 m-weighted loss: multiplies residual by x^(0.5+m) on LHS, x^(1.5+m) on RHS
  # m=-0.5 is equivalent to no m-weighting (baseline)
  use_m_loss: True
  m_loss_m_value: -0.5  # sweep values: -0.5, 0, 0.5, 1.0

  ## normalisation (alpha)
  norm_mode: "standardize"   # minmax or standardize
  standard_mean: 0.0  # Will be computed from train data
  standard_std: 1.0   # Will be computed from train data
  minmax_min: -1.0
  minmax_max: 1.0

  ## normalisation (T) - computed from train data
  T_mean: 0.0
  T_std: 1.0

  ## normalisation (x)
  use_log_x: False           # If True, use log(x) as detached 4th input (original)
  use_log_lam_x: True       # If True, use log(λx) as detached 4th input (new)
  x_log_mean: 0.0            # Will be computed from train data (used by whichever is active)
  x_log_std: 1.0             # Will be computed from train data

  ## optimizer parameters
  lr_type: "linear_decay" # constant, linear, cosine, linear_decay, cosine_restarts, cosine_decaying_restarts
  constant_lr: 1e-4
  start_lr: 1e-5
  end_lr: 1e-3
  lr_warmup_epochs: 50
  min_lr: 5e-5  # Minimum LR at the bottom of every cosine cycle
  cosine_restart_period: 400  # Epochs per cycle for cosine_restarts / cosine_decaying_restarts
  restart_decay_factor: 0.7   # Geometric decay of peak LR per cycle (cosine_decaying_restarts only)
  # cosine_decay_epochs: 800  # Fixed cosine decay period (omit to use total_epochs - warmup)
  grad_clipping: True  # Clips to clip_value
  clip_value: 1.0

  # Extra min-LR tail: run the chosen schedule for (epochs - extra_epoch_amount)
  # epochs, then hold at min_lr for the remaining extra_epoch_amount epochs.
  # Overrides cosine_decay_epochs when lr_type is cosine.
  add_extra_minlr_epochs: True
  extra_epoch_amount: 100

  ## loss parameters
  loss_type: "mse"
  # Residual normalization strategy for training
  # "coeff": divide by λ³/γ (current default)
  # "relative": divide by max(|LHS|, |RHS|) - per-sample relative error  
  # "rel_l2": divide by RHS L2 norm (over batch) - global relative L2 error"
  residual_norm_strategy: "rel_l2"
  
  fmt_help: False
  loss_strategy: "fixed" # "fixed" or "adaptive"
  fmt_weights: {"residual": 1.0, "fmt": 1.0}
  cancel_c: False

  ## hybrid training (data + physics loss)
  hybrid_training: True  # If True, combine PDE loss with data loss
  use_solver_data: True  # If True, load data in {inputs, targets} format
  data_loss_type: "rel_l2"  # options: "mse", "rel_l2"
  val_norm: "rel_l1"  # "rel_l2" or "rel_l1" — controls ALL validation losses
  hybrid_weight_strategy: "fixed"  # "fixed" or "adaptive" (adaptive overrides schedule below)
  hybrid_weight_schedule: "cosine"  # "fixed", "step", or "cosine"
  # Starting weights (epoch 0)
  physics_loss_weight: 0.0
  data_loss_weight: 5.0
  deriv_loss_weight: 1.0
  # Final weights (last epoch) — cosine interpolation between start and end
  physics_loss_weight_final: 3.0
  data_loss_weight_final: 3.0
  deriv_loss_weight_final: 2.0
  data_loss_step_epochs: 500  # Only used when hybrid_weight_schedule: "step"
  # Delayed cosine schedule for physics weight only:
  # Hold physics weight fixed for `physics_weight_delay_epochs`, then cosine from start to final over remaining epochs.
  # Data weight still uses the normal full-range cosine schedule.
  physics_weight_delayed_cosine: False  # Set True to enable
  physics_weight_delay_epochs: 800      # Number of epochs to hold physics_loss_weight fixed before cosine begins
  # Delayed cosine schedule for deriv weight only:
  # Hold deriv weight fixed for `deriv_weight_delay_epochs`, then cosine from start to final over remaining epochs.
  # Set False to revert to normal full-range cosine schedule.
  deriv_weight_delayed_cosine: False  # Set True to enable
  deriv_weight_delay_epochs: 400       # Number of epochs to hold deriv_loss_weight fixed before cosine begins
  # Auxiliary boundary loss (x=1 points vs solver targets, rel_l2)
  # Weight is held at initial value for boundary_weight_delay_epochs, then cosine-interpolates to final.
  use_boundary_loss: True          # Set True to enable
  boundary_loss_weight: 0.0         # Initial weight (held for delay epochs)
  boundary_loss_weight_final: 4.0   # Final weight after cosine ramp
  boundary_weight_delay_epochs: 500 # Epochs before cosine begins

  ## derivative target loss
  use_deriv_loss: True        # If True, add dψ/dx matching loss from solver data

  ## data parameters
  data_path: "data/phase_4_solver_mega_coarse.pt"
  filter_x_min: True          # If True, remove data points with x < x_min_threshold before splitting
  x_min_threshold: 1e-6       # Minimum x value to keep (points below are removed)

  ## extended loader (new two-file parameter-space split)
  use_extended_loader: True
  fine_data_path: "data/phase_4_solver_mega_fine.pt"
  # Absolute training range for curriculum learning (null = use full coarse data range).
  # For staged training: set explicit values here, save weights, then widen the range
  # in the next run using pretrained_weights_path. Always use cumulative ranges
  # (keep the easy lower bound) to avoid forgetting.
  alpha_min_train: 0.5
  alpha_max_train: 5
  T_min_train: 1
  T_max_train: 10
  interp_val_n_samples: 50000
  ood_eval_interval: 50

  batch_size: 512
  shuffle_train: True
  use_sqrtx: False

  ## pretrained weights (optional warm-start)
  # Relative paths are resolved from PROJECT_ROOT.
  # Example: pretrained_weights_path: "saving_weights/some_run/weights_epoch_1000"
  pretrained_weights_path: null

  ## training parameters
  stage: "train"
  epochs: 1450

  # saving
  save_preds: False
  save_every: 1000
  plot_auto: False
  save_weights: True
  save_weights_every: 100
  pred_dir: "predictions"
  plot_dir: "plot_predictions"

  # diagnostic plots during training
  save_plots_during_training: True
  save_training_plots_every: 100
